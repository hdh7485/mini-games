<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게임월드</title>
    <link rel="stylesheet" href="portal.css">
</head>
<body>
    <div class="portal">
        <h1 class="portal-title">게임월드</h1>

        <div class="game-grid">
            <a href="sudoku/index.html" class="game-card">

                        <div class="mini-card c2">♠</div>

                </div>
